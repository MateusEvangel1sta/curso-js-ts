<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Exercício 11</title>
  </head>
  <body>

    <script>
      const numero = Number(prompt('Digite um número: '));
      const raizNumero = Math.sqrt(numero);
      const numeroInteiro = Number.isInteger(numero);
      const numeroNaN = isNaN(numero);
      const numeroBaixo = Math.floor(numero);
      const numeroCima = Math.ceil(numero);
      const numeroDuasCasas = numero.toFixed(2);

      document.body.innerHTML = `Raiz quadrada: ${raizNumero}.<br />`;
      document.body.innerHTML += `${numero} é inteiro: ${numeroInteiro}.<br />`;
      document.body.innerHTML += `É NaN: ${numeroNaN}.<br />`;
      document.body.innerHTML += `Arredondando para baixo: ${numeroBaixo}.<br />`;
      document.body.innerHTML += `Arredondando para cima: ${numeroCima}.<br />`;
      document.body.innerHTML += `Com duas casas decimais: ${numeroDuasCasas}.<br />`;
    </script>
  </body>
</html>
