<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Exercício 09</title>
  </head>
  <body>

    <script>
      const nome = prompt('Digite seu nome completo: ');
      const tamanhoNome = nome.length;
      const segundaLetra = nome[1];
      const primeiraLetraA = nome.indexOf('a');
      const ultimaLetraA = nome.lastIndexOf('a');
      const ultimasTresLetras = nome.slice(nome.length - 3);
      const palavrasNome = nome.split(' ');
      const nomeMaiusculo = nome.toUpperCase();
      const nomeMinusculo = nome.toLowerCase();

      document.body.innerHTML += `O seu nome é ${nome}<br />`;
      document.body.innerHTML += `O seu nome tem ${tamanhoNome} letras.<br />`;
      document.body.innerHTML += `A segunda letra do seu nome é: ${segundaLetra}.<br />`;
      document.body.innerHTML += `O pimeiro índice da letra "a" no seu nome: ${primeiraLetraA}.<br />`;
      document.body.innerHTML += `O último índice da letra "a" no seu nome: ${ultimaLetraA}.<br />`;
      document.body.innerHTML += `As últimas 3 letras do se nome são: ${ultimasTresLetras}.<br />`;
      document.body.innerHTML += `As palavras do seu nome são: ${palavrasNome}.<br />`;
      document.body.innerHTML += `Seu nome com letras maiúsculas: ${nomeMaiusculo}.<br />`;
      document.body.innerHTML += `Seu nome com letras minúsculas: ${nomeMinusculo}.<br />`;
      
    </script>
  </body>
</html>
